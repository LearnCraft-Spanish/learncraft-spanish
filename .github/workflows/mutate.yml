name: Mutation Testing Report

on:
  schedule:
    # Thu & Sun 00:00 CST (06:00 UTC). During CDT, runs 01:00 local — GitHub cron is UTC-only.
    - cron: '0 6 * * 0,4'
  workflow_dispatch:

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: staging

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

      - name: Run Mutation Testing
        run: pnpm mutate
        env:
          VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}

      - name: Upload Mutation Report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/frontend-mutation.html # Adjust to your Stryker report directory
