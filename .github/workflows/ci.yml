# Full CI flow for the project
name: Continuous Integration

on:
  # master branch will not accept if any failed
  # development branch will accept regardless of the status of the jobs
  # pull_request: validate PR branch before merge (required for PR checks).
  # push: validate when commits land on protected branches (merge + direct push).
  # Omit pull_request "closed" so merge does not double-run with push to the same branch.
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - staging
      - development
      - main
  push:
    branches:
      - staging
      - development
      - main
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

      # Run Prettier
      - name: Run Prettier
        run: pnpm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

      # Run TypeCheck
      - name: Run Typecheck
        run: pnpm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

      # Run ESLint
      - name: Run ESLint
        run: pnpm run lint

  test:
    runs-on: ubuntu-latest
    needs: [format, typecheck, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          # Suppress context access warning
          # Context access is safe in this case
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

        # Run the test suite
      - name: Run tests
        run: pnpm run test
        env:
          VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}

  test-hexagon:
    runs-on: ubuntu-latest
    needs: [format, typecheck, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Set up Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24.15.0

      # Write .npmrc
      - name: Write .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGE_KEY }}" > .npmrc
          echo "@learncraft-spanish:registry=https://npm.pkg.github.com" >> .npmrc
          echo "package-manager=pnpm" >> .npmrc
          echo "engine-strict=true" >> .npmrc

      # Install pnpm
      - name: Install pnpm
        run: npm install -g pnpm@9.7

      # Cache Node.js dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v5
        with:
          path: node_modules
          key: cache-node-modules-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cache-node-modules-

      # Install dependencies
      - name: Install dependencies
        run: pnpm install:ci
        env:
          # Suppress context access warning
          # Context access is safe in this case
          GH_PACKAGE_KEY: ${{ secrets.GH_PACKAGE_KEY }}

        # Run the test suite
      - name: Run tests in hexagon
        run: pnpm run test:hexagon
        env:
          VITE_BACKEND_URL: ${{ secrets.BACKEND_URL }}
